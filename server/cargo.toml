[package]
name = "fatebinder-server"
version.workspace = true
edition.workspace = true

[[bin]]
name = "fatebinder-server"
path = "src/main.rs"	

[dependencies]

# Our networking and multiplayer dependencies

tokio = { version = "1.40", features = ["full"] }
tokio-tungstenite = "0.23"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Procedural Generation and world mngmt setting

noise = "0.9"
rand = "0.8"

# Math & Geo customs
nalgebra = "0.33"
nalgebra-glm = "0.2"

# Asyncer utility
futures = "0.3"
uuid = { version = "1.1", features = ["v4"] }

# Data logging
tracing = "0.1"
tracing-subscriber = "0.3"

# Error handling
thiserror = "1.0"
anyhow = "1.0"

